services:
  - type: web
    name: signhub-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: corepack enable && corepack pnpm install --frozen-lockfile && corepack pnpm --filter @signhub/api build
    startCommand: corepack pnpm --filter @signhub/database db:push && corepack pnpm --filter @signhub/api start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        value: file:./packages/database/dev.db
      - key: DISABLE_QUEUES
        value: "true"
      - key: LOCAL_FILE_STORAGE
        value: "true"
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: SIGN_URL_BASE
        sync: false
      - key: WEB_APP_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: SignHub <no-reply@signhub.local>

  - type: web
    name: signhub-web
    runtime: node
    plan: free
    rootDir: .
    buildCommand: corepack enable && corepack pnpm install --frozen-lockfile && corepack pnpm --filter @signhub/web build
    startCommand: corepack pnpm --filter @signhub/web start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false
